name: Render Keep-Warm

# B4: Render's free tier sleeps the API dyno after inactivity, causing a
# ~30-60s cold start on the first phone visit. Polling /health during the
# hours you'd actually study keeps it warm without exceeding Render's free
# 750 instance-hours/month (this schedule uses ~510).
#
# Dormant until API_HEALTH_URL is set (Settings > Secrets and variables >
# Actions > Variables) — the check step exits cleanly instead of curling a
# URL that doesn't exist yet.
on:
  schedule:
    # */10 0-17 * * * UTC = every 10 min, 00:00-17:59 UTC = 07:00-24:59 ICT
    # (Asia/Ho_Chi_Minh, UTC+7) — adjust if you study at different hours.
    - cron: '*/10 0-17 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          if [ -z "${{ vars.API_HEALTH_URL }}" ]; then
            echo "::notice::API_HEALTH_URL is not set — skipping (see README.md's Deploy section)."
            exit 0
          fi
          curl -sf --max-time 30 "${{ vars.API_HEALTH_URL }}" || echo "::warning::Health check failed (cold start in progress is normal)."
