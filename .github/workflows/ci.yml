name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: momito
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d momito"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/momito?schema=public
      # MOM-020: schema.prisma now declares directUrl for Neon (non-pooled
      # connection for migrate); CI's plain Postgres has no pooler, so both point
      # at the same database.
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/momito?schema=public
      JWT_SECRET: ci-only-secret-with-at-least-32-characters
      NODE_ENV: test
      # MOM-178: the *.int.spec.ts tier runs against a real database and
      # TRUNCATEs between tests, so it keys off its own variable and never
      # DATABASE_URL — on a developer machine that is their actual practice
      # history. A separate database here also keeps the guard in
      # test/helpers/db.ts meaningful (it refuses when the two URLs match).
      # Unset elsewhere, the tier self-skips.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/momito_test?schema=public

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm --filter @momito/api exec prisma migrate deploy

      - name: Seed database
        run: pnpm db:seed

      # MOM-178: a second, empty database for the integration tier. Separate
      # from the seeded one because those tests TRUNCATE, and because the guard
      # in test/helpers/db.ts refuses to run when TEST_DATABASE_URL and
      # DATABASE_URL are the same database.
      - name: Prepare integration test database
        run: |
          PGPASSWORD=postgres createdb -h localhost -U postgres momito_test
          DATABASE_URL="$TEST_DATABASE_URL" DIRECT_URL="$TEST_DATABASE_URL" \
            pnpm --filter @momito/api exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
